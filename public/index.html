<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi App - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>📋 Presensi App</h1>
      <div class="tab-nav">
        <button class="tab-btn active" data-tab="login">Login</button>
        <button class="tab-btn" data-tab="register">Register</button>
      </div>
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Masukkan username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p id="login-error" class="error-msg"></p>
      </form>
      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="reg-username" placeholder="Pilih username" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="Masukkan email" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Buat password" required>
        </div>
        <button type="submit" class="btn-primary">Register</button>
        <p id="register-error" class="error-msg"></p>
      </form>
    </div>
  </div>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-form').classList.add('active');
        document.getElementById('login-error').textContent = '';
        document.getElementById('register-error').textContent = '';
      });
    });
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { document.getElementById('login-error').textContent = data.error; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        document.getElementById('login-error').textContent = 'Gagal terhubung ke server';
      }
    });
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('reg-username').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password })
        });
        const data = await res.json();
        if (!res.ok) { document.getElementById('register-error').textContent = data.error; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/dashboard.html';
      } catch (err) {
        document.getElementById('register-error').textContent = 'Gagal terhubung ke server';
      }
    });
  </script>
</body>
</html>
